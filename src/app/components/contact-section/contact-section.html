<section id="contact" class="section-padding bg-secondary/30">
  <div class="max-w-5xl mx-auto">
    <div>
      <h2 class="text-3xl md:text-5xl font-bold mb-2">
        Get In <span class="gradient-text">Touch</span>
      </h2>
      <div class="w-16 h-1 bg-primary rounded-full mb-10"></div>
    </div>

    <div class="grid md:grid-cols-2 gap-12">
      <div>
        <p class="text-muted-foreground mb-8 leading-relaxed">
          I'm always open to discussing new projects, creative ideas, or opportunities. Feel free to reach out!
        </p>

        <div class="flex flex-col gap-5">
          <a
            href="mailto:saksham90346@gmail.com"
            class="flex items-center gap-4 text-sm text-muted-foreground hover:text-primary transition-colors">
            <div class="p-3 rounded-xl bg-primary/10 text-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m2 7 8.97 5.7a1.94 1.94 0 0 0 2.06 0L22 7"/></svg>
            </div>
            saksham90346&#64;gmail.com
          </a>
          <div class="flex items-center gap-4 text-sm text-muted-foreground">
            <div class="p-3 rounded-xl bg-primary/10 text-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            +91 9034643905
          </div>
          <div class="flex items-center gap-4 text-sm text-muted-foreground">
            <div class="p-3 rounded-xl bg-primary/10 text-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            Kurukshetra, Haryana, India
          </div>
        </div>

        <div class="flex gap-4 mt-8">
          <a
            href="https://github.com/SakshamBansal1"
            target="_blank"
            rel="noopener noreferrer"
            class="contact-social-link">
            <i class="bi bi-github" style="font-size: 20px;"></i>
          </a>
          <a
            href="https://www.linkedin.com/in/saksham90346/"
            target="_blank"
            rel="noopener noreferrer"
            class="contact-social-link">
            <i class="bi bi-linkedin" style="font-size: 20px;"></i>
          </a>
        </div>
      </div>

      <form
        (ngSubmit)="onSubmit()"
        class="glass-card p-6 md:p-8 flex flex-col gap-5">
        <div>
          <label for="name" class="text-sm font-medium mb-1.5 block">
            Name
          </label>
          <input
            id="name"
            type="text"
            required
            [(ngModel)]="form.name"
            name="name"
            class="w-full px-4 py-3 rounded-xl bg-secondary border border-border text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all"
            placeholder="Your name" />
        </div>
        <div>
          <label for="email" class="text-sm font-medium mb-1.5 block">
            Email
          </label>
          <input
            id="email"
            type="email"
            required
            [(ngModel)]="form.email"
            name="email"
            class="w-full px-4 py-3 rounded-xl bg-secondary border border-border text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all"
            placeholder="your@email.com" />
        </div>
        <div>
          <label for="message" class="text-sm font-medium mb-1.5 block">
            Message
          </label>
          <textarea
            id="message"
            required
            rows="4"
            [(ngModel)]="form.message"
            name="message"
            class="w-full px-4 py-3 rounded-xl bg-secondary border border-border text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all resize-none"
            placeholder="Your message..."></textarea>
        </div>
        <button
          type="submit"
          class="flex items-center justify-center gap-2 w-full px-6 py-3 rounded-xl bg-primary text-primary-foreground font-medium hover:opacity-90 transition-opacity text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          Send Message
        </button>
      </form>
    </div>
  </div>
</section>

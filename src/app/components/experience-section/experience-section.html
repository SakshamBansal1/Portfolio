<section id="experience" class="section-padding">
  <div class="max-w-4xl mx-auto">
    <div>
      <h2 class="text-3xl md:text-5xl font-bold mb-2">
        Work <span class="gradient-text">Experience</span>
      </h2>
      <div class="w-16 h-1 bg-primary rounded-full mb-10"></div>
    </div>

    <!-- Timeline -->
    <div class="relative">
      <!-- Line -->
      <div class="absolute left-6 md:left-8 top-0 bottom-0 w-px bg-border"></div>

      <div class="relative pl-16 md:pl-20">
        <!-- Dot -->
        <div class="absolute left-4 md:left-6 top-1 w-4 h-4 rounded-full bg-primary border-4 border-background"></div>

        <div class="glass-card p-6 md:p-8">
          <div class="flex items-center gap-2 text-primary mb-1">
            <i class="bi bi-briefcase" style="font-size: 16px;"></i>
            <span class="font-mono text-xs uppercase tracking-wider">Oct 2025 – Present</span>
          </div>
          <h3 class="text-xl font-bold mb-1">Software Developer</h3>
          <p class="text-muted-foreground text-sm mb-4">Vision Plus Security Control Ltd.</p>

          <ul class="space-y-2">
            @for (item of highlights; track $index) {
              <li class="flex items-start gap-2 text-sm text-muted-foreground">
                <span class="text-primary mt-1.5 shrink-0">▹</span>
                {{ item }}
              </li>
            }
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>

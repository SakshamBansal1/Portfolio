<section id="skills" class="section-padding bg-secondary/30">
  <div class="max-w-6xl mx-auto">
    <div>
      <h2 class="text-3xl md:text-5xl font-bold mb-2">
        Tech <span class="gradient-text">Stack</span>
      </h2>
      <div class="w-16 h-1 bg-primary rounded-full mb-10"></div>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
      @for (cat of categories; track cat.title) {
        <div class="glass-card skill-category-card p-6 hover:border-primary/20 transition-colors duration-300">
          <div class="flex items-center gap-3 mb-6">
            <div class="skill-icon-wrapper p-2 rounded-lg bg-primary/10 text-primary" [innerHTML]="getIcon(cat.icon)"></div>
            <h3 class="text-lg skill-category-title">{{ cat.title }}</h3>
          </div>

          <div class="flex flex-wrap gap-2">
            @for (skill of cat.skills; track skill) {
              <span class="skill-tag">
                <span class="skill-dot">•</span> {{ skill }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
